<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Network 2.0 — Memory Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
    }

    .header {
      padding: 32px 40px 24px;
      border-bottom: 1px solid #1a1a1a;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
    }

    .header p {
      color: #666;
      margin-top: 6px;
      font-size: 14px;
    }

    .stats {
      display: flex;
      gap: 24px;
      margin-top: 16px;
    }

    .stat {
      font-size: 13px;
      color: #888;
    }

    .stat span {
      color: #fff;
      font-weight: 600;
      font-size: 18px;
      margin-right: 4px;
    }

    .container {
      padding: 32px 40px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
      gap: 20px;
    }

    .person-card {
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .person-card:hover {
      border-color: #333;
    }

    .person-header {
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid #1a1a1a;
    }

    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #1e1e1e;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      color: #555;
      flex-shrink: 0;
    }

    .avatar.has-color-1 { background: #1a1a2e; color: #6366f1; }
    .avatar.has-color-2 { background: #1a2e1a; color: #22c55e; }
    .avatar.has-color-3 { background: #2e1a1a; color: #ef4444; }
    .avatar.has-color-4 { background: #2e2a1a; color: #eab308; }
    .avatar.has-color-5 { background: #1a2a2e; color: #06b6d4; }

    .person-info h2 {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
    }

    .person-meta {
      font-size: 12px;
      color: #555;
      margin-top: 2px;
    }

    .memories-list {
      padding: 8px 0;
    }

    .memory-item {
      padding: 14px 24px;
      border-bottom: 1px solid #141414;
    }

    .memory-item:last-child {
      border-bottom: none;
    }

    .memory-summary {
      font-size: 14px;
      color: #ccc;
      line-height: 1.5;
    }

    .memory-transcript {
      margin-top: 8px;
      padding: 10px 14px;
      background: #0d0d0d;
      border-radius: 8px;
      border-left: 3px solid #333;
      font-size: 13px;
      color: #999;
      line-height: 1.5;
    }

    .memory-transcript::before {
      content: '"';
      color: #555;
    }

    .memory-transcript::after {
      content: '"';
      color: #555;
    }

    .memory-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 10px;
      font-size: 11px;
      color: #444;
    }

    .tag {
      background: #1a1a1a;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      color: #666;
    }

    .importance-bar {
      width: 40px;
      height: 4px;
      background: #1a1a1a;
      border-radius: 2px;
      overflow: hidden;
      display: inline-block;
    }

    .importance-fill {
      height: 100%;
      border-radius: 2px;
    }

    .imp-high { background: #ef4444; }
    .imp-med { background: #eab308; }
    .imp-low { background: #333; }

    .empty-state {
      text-align: center;
      padding: 80px 40px;
      color: #444;
    }

    .empty-state h2 {
      font-size: 20px;
      color: #555;
      margin-bottom: 8px;
    }

    .refresh-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      color: #888;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }

    .refresh-btn:hover {
      background: #222;
      color: #fff;
      border-color: #444;
    }

    @media (max-width: 500px) {
      .container { padding: 16px; grid-template-columns: 1fr; }
      .header { padding: 20px 16px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Social Network 2.0</h1>
    <p>Person-indexed memory dashboard</p>
    <div class="stats" id="stats"></div>
  </div>
  <div class="container" id="container"></div>
  <button class="refresh-btn" onclick="load()">Refresh</button>

  <script>
    const API = window.location.origin;
    const COLORS = ['has-color-1','has-color-2','has-color-3','has-color-4','has-color-5'];

    function getInitials(name) {
      if (!name) return '?';
      return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
    }

    function timeAgo(ts) {
      if (!ts) return '';
      const d = new Date(ts);
      const now = new Date();
      const diff = Math.floor((now - d) / 1000);
      if (diff < 60) return 'just now';
      if (diff < 3600) return Math.floor(diff/60) + 'm ago';
      if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
      return Math.floor(diff/86400) + 'd ago';
    }

    function impClass(v) {
      if (v >= 0.5) return 'imp-high';
      if (v >= 0.2) return 'imp-med';
      return 'imp-low';
    }

    function renderPerson(person, idx) {
      const name = person.name || `Person #${person.id}`;
      const color = COLORS[idx % COLORS.length];
      const memCount = person.memories.length;

      let memoriesHtml = '';
      for (const m of person.memories) {
        const tags = (m.tags || []).map(t => `<span class="tag">${t}</span>`).join('');
        const transcript = m.transcript && m.transcript !== 'No speech detected.'
          ? `<div class="memory-transcript">${m.transcript}</div>` : '';

        memoriesHtml += `
          <div class="memory-item">
            <div class="memory-summary">${m.summary}</div>
            ${transcript}
            <div class="memory-meta">
              <span class="importance-bar"><span class="importance-fill ${impClass(m.importance)}" style="width:${m.importance*100}%"></span></span>
              <span>${m.source}</span>
              <span>${timeAgo(m.timestamp)}</span>
              ${tags}
            </div>
          </div>`;
      }

      return `
        <div class="person-card">
          <div class="person-header">
            <div class="avatar ${color}">${getInitials(name)}</div>
            <div>
              <div class="person-info"><h2>${name}</h2></div>
              <div class="person-meta">${memCount} memor${memCount === 1 ? 'y' : 'ies'} · Added ${timeAgo(person.created_at)}</div>
            </div>
          </div>
          <div class="memories-list">${memoriesHtml}</div>
        </div>`;
    }

    async function load() {
      try {
        const res = await fetch(API + '/api/persons');
        const persons = await res.json();

        const container = document.getElementById('container');
        const statsEl = document.getElementById('stats');

        const totalMemories = persons.reduce((sum, p) => sum + p.memories.length, 0);
        statsEl.innerHTML = `
          <div class="stat"><span>${persons.length}</span> people</div>
          <div class="stat"><span>${totalMemories}</span> memories</div>
        `;

        if (persons.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <h2>No people yet</h2>
              <p>Enroll someone through the glasses or run: python ingest.py video.mp4</p>
            </div>`;
          return;
        }

        container.innerHTML = persons.map((p, i) => renderPerson(p, i)).join('');
      } catch (e) {
        document.getElementById('container').innerHTML = `
          <div class="empty-state">
            <h2>Cannot connect to server</h2>
            <p>Make sure the server is running: python server.py</p>
          </div>`;
      }
    }

    load();
    setInterval(load, 10000);
  </script>
</body>
</html>
